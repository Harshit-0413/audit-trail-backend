spring.application.name=audit-trail-backend

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/auditdb
spring.data.mongodb.database=auditdb

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Kafka Producer
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Kafka Consumer
spring.kafka.consumer.group-id=audit-consumer-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.audit.model
spring.kafka.consumer.properties.spring.json.value.default.type=com.audit.model.AuditEvent

# Audit config
audit.kafka.topic=audit-events
audit.kafka.partitions=3
audit.kafka.replicas=1
audit.redis.stats-ttl-seconds=60
audit.redis.recent-events-size=100

# Server
server.port=8080

# Logging
logging.level.com.audit=DEBUG
logging.level.org.springframework.kafka=INFO





